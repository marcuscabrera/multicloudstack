# pytest configuration for MiniStack multi-cloud tests

[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
markers =
    serial: test must run in a dedicated sequential phase
    aws: AWS-specific tests
    azure: Azure-specific tests
    gcp: GCP-specific tests
    huawei: Huawei Cloud-specific tests
    multicloud: Multi-cloud integration tests
    slow: slow running tests
addopts = 
    -v
    --tb=short
    -ra
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
