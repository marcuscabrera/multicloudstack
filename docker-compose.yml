version: "3.8"

services:
  ministack:
    build: .
    image: ministackorg/ministack:latest
    container_name: ministack
    ports:
      - "4566:4566"
    environment:
      - GATEWAY_PORT=4566
      - LOG_LEVEL=INFO
      - CLOUD_MODE=all
      - HUAWEI_MODE=0
      - AZURE_MODE=0
      - HUAWEICLOUD_SDK_AK=test
      - HUAWEICLOUD_SDK_SK=test
      - HUAWEICLOUD_PROJECT_ID=0000000000000000
      - HUAWEICLOUD_REGION=cn-north-4
      - AZURE_TENANT_ID=00000000-0000-0000-0000-000000000000
      - AZURE_SUBSCRIPTION_ID=00000000-0000-0000-0000-000000000001
      - AZURE_CLIENT_ID=test
      - AZURE_CLIENT_SECRET=test
      - S3_PERSIST=0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RDS_BASE_PORT=15432
      - ELASTICACHE_BASE_PORT=16379
    volumes:
      - ./data/s3:/tmp/ministack-data/s3
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ministack-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Optional: Postgres for RDS (always-on, no Docker-in-Docker needed)
  # Uncomment to have a persistent Postgres available at localhost:5432
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: ministack-postgres
  #   ports:
  #     - "5432:5432"
