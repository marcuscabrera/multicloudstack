version: "3.9"

services:
  ministack-gcp:
    build: .
    image: ministackorg/ministack:gcp
    container_name: ministack-gcp
    ports:
      - "4566:4566"
    environment:
      - GATEWAY_PORT=4566
      - LOG_LEVEL=INFO
      - CLOUD_MODE=gcp
      - GCP_PROJECT_ID=ministack-emulator
      - GCP_REGION=us-central1
      - GCP_ZONE=us-central1-a
      - PERSIST_STATE=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_gcp/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ministack-gcp-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
