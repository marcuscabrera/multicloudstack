version: "3.8"

services:
  ministack-huawei:
    build: .
    image: ministackorg/ministack:huawei
    container_name: ministack-huawei
    ports:
      - "4566:4566"
    environment:
      - GATEWAY_PORT=4566
      - LOG_LEVEL=INFO
      - CLOUD_MODE=huawei
      - HUAWEI_MODE=1
      - AZURE_MODE=0
      - HUAWEICLOUD_SDK_AK=test
      - HUAWEICLOUD_SDK_SK=test
      - HUAWEICLOUD_PROJECT_ID=0000000000000000
      - HUAWEICLOUD_REGION=cn-north-4
      - S3_PERSIST=0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RDS_BASE_PORT=15432
      - ELASTICACHE_BASE_PORT=16379
    volumes:
      - ./data/s3:/tmp/ministack-data/s3
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_huawei/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ministack-huawei-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
